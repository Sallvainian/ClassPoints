name: Test Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6am UTC
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Shared environment variables
  CI: true
  PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

  bundle-check:
    name: Bundle DCE Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install fnox
        uses: jdx/mise-action@v3
        with:
          tool_versions: |
            fnox latest

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # NFR4: prod bundle must not contain react-query-devtools. See
      # scripts/check-bundle.mjs and docs/adr/ADR-005-queryclient-defaults.md.
      # Primary path uses fnox for consistency with dev/build/other CI jobs;
      # fork PRs (and dependabot pre-permission) lack FNOX_AGE_KEY, so fall
      # back to dummy VITE_SUPABASE_* vars. DCE assertion is compile-time
      # determined — identical outcome in either path.
      - name: Build (fnox primary, envvar fallback)
        env:
          FNOX_AGE_KEY: ${{ secrets.FNOX_AGE_KEY }}
        run: |
          if [ -n "$FNOX_AGE_KEY" ]; then
            npm run build
          else
            echo "FNOX_AGE_KEY not available (likely a fork PR); falling back to dummy envs"
            VITE_SUPABASE_URL=http://127.0.0.1:54321 \
            VITE_SUPABASE_ANON_KEY=dummy-fork-pr-value \
              npx vite build
          fi

      - name: Run bundle DCE assertion
        run: npm run check:bundle

  test:
    name: E2E Tests (Shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Install fnox
        uses: jdx/mise-action@v3
        with:
          tool_versions: |
            fnox latest

      - name: Run tests with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_on: error
          command: fnox exec -- npm run test:e2e -- --shard=${{ matrix.shard }}/4
        env:
          FNOX_AGE_KEY: ${{ secrets.FNOX_AGE_KEY }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  burn-in:
    name: Flaky Test Detection
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Install fnox
        uses: jdx/mise-action@v3
        with:
          tool_versions: |
            fnox latest

      - name: Run burn-in loop (10 iterations)
        run: |
          for i in {1..10}; do
            echo "🔥 Burn-in iteration $i/10"
            fnox exec -- npm run test:e2e || exit 1
          done
        env:
          FNOX_AGE_KEY: ${{ secrets.FNOX_AGE_KEY }}

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: burn-in-failures
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  # Summary job for branch protection
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [lint, bundle-check, test, burn-in]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" ]]; then
            echo "❌ Lint failed"
            exit 1
          fi
          if [[ "${{ needs.bundle-check.result }}" == "failure" ]]; then
            echo "❌ Bundle DCE check failed — devtools leaked to prod"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "❌ Tests failed"
            exit 1
          fi
          if [[ "${{ needs.burn-in.result }}" == "failure" ]]; then
            echo "❌ Burn-in detected flaky tests"
            exit 1
          fi
          echo "✅ All checks passed"
